<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header>
    <h1>Expense &amp; Budget Visualizer</h1>
    <div id="balance-display">Total: $0.00</div>
  </header>

  <main>
    <!-- Left column -->
    <section id="input-section">

      <form id="transaction-form" novalidate>
        <h2>Add Transaction</h2>

        <div class="form-group">
          <label for="item-name">Item name</label>
          <input id="item-name" type="text" placeholder="Item name" autocomplete="off" />
        </div>

        <div class="form-group">
          <label for="item-amount">Amount</label>
          <input id="item-amount" type="number" min="0.01" step="0.01" placeholder="Amount" />
        </div>

        <div class="form-group">
          <label for="item-category">Category</label>
          <select id="item-category"></select>
        </div>

        <button type="submit">Add Transaction</button>
        <p id="form-error" class="error-msg" aria-live="polite"></p>
      </form>

      <div id="category-section">
        <h2>Add Category</h2>

        <div class="form-group">
          <label for="new-category">New category name</label>
          <input id="new-category" type="text" placeholder="New category name" autocomplete="off" />
        </div>

        <button id="add-category-btn" type="button">Add Category</button>
        <p id="category-error" class="error-msg" aria-live="polite"></p>
      </div>

      <div id="limit-section">
        <h2>Set Spending Limit</h2>

        <div class="form-group">
          <label for="limit-category-select">Category</label>
          <select id="limit-category-select"></select>
        </div>

        <div class="form-group">
          <label for="limit-amount">Spending limit</label>
          <input id="limit-amount" type="number" min="0.01" step="0.01" placeholder="Spending limit" />
        </div>

        <button id="set-limit-btn" type="button">Set Limit</button>
        <p id="limit-error" class="error-msg" aria-live="polite"></p>
      </div>

    </section>

    <!-- Right column -->
    <section id="chart-section">
      <canvas id="pie-chart" aria-label="Pie chart showing spending distribution by category" role="img"></canvas>
    </section>
  </main>

  <section id="list-section">
    <div id="sort-controls">
      <label for="sort-select">Sort by:</label>
      <select id="sort-select">
        <option value="none">None (insertion order)</option>
        <option value="amount-asc">Amount ↑</option>
        <option value="amount-desc">Amount ↓</option>
        <option value="category-asc">Category A–Z</option>
        <option value="category-desc">Category Z–A</option>
      </select>
    </div>
    <ul id="transaction-list" aria-label="Transaction list"></ul>
    <p id="empty-state" class="empty-msg">No transactions yet.</p>
  </section>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
